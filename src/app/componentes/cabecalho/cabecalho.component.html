<header class="cabecalho">
    <img src="/assets/logo.png" alt="logo">
    @if(!telaIniciais){
    <div class="link">
        <button routerLink="/lista-contatos">
            <img class="seta" src="assets/arrow-left.png" alt="">
            <a>Voltar</a>
        </button>
    </div>
    }
    <img [src]="bannerSrc" alt="banner">
    <h1 [ngClass]="'telaIniciais' ? 'titulo' : 'titulo-form'" 
    [innerHTML]="titulo">
</h1>
</header>
